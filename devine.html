<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devine • Web4 Soulbound Identity</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap');
    body { font-family: 'Orbitron', sans-serif; }
    .chat-bubble-user { background: linear-gradient(135deg, #22d3ee, #a855f7); }
    .chat-bubble-ai { background: #1f2937; }
  </style>
</head>
<body class="bg-black text-cyan-300 min-h-screen">

  <div class="max-w-2xl mx-auto p-4">
    <div class="text-center py-8">
      <h1 class="text-5xl font-bold tracking-widest neon-cyan">DEVINE</h1>
      <p class="text-xl text-pink-400 mt-2">Soulbound Identity • Web4</p>
    </div>

    <!-- AI CHAT -->
    <div class="bg-zinc-950 border border-cyan-500/30 rounded-3xl p-6 h-[520px] flex flex-col">
      <div class="flex items-center gap-3 mb-6 border-b border-cyan-900 pb-4">
        <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-cyan-400 rounded-2xl flex items-center justify-center text-2xl">𝕏</div>
        <div>
          <p class="font-bold">Devine AI Companion</p>
          <p class="text-xs text-green-400">● Soulbound • Always Yours</p>
        </div>
      </div>

      <!-- Messages -->
      <div id="chat-messages" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2">
        <!-- Messages appear here -->
      </div>

      <!-- Input -->
      <div class="flex gap-3">
        <input id="user-input" 
               type="text" 
               placeholder="Ask me anything about your identity, Web4, or Devine..."
               class="flex-1 bg-zinc-900 border border-cyan-500/50 rounded-2xl px-5 py-4 focus:outline-none focus:border-pink-500 text-white">
        <button onclick="sendMessage()" 
                class="bg-gradient-to-r from-cyan-400 to-purple-500 px-8 rounded-2xl font-bold">
          Send
        </button>
      </div>
    </div>

    <div class="text-center text-xs text-cyan-500/50 mt-6">
      Devine v0.1 • Your identity. Your rules.
    </div>
  </div>

  <script>
    const messagesContainer = document.getElementById('chat-messages');

    function addMessage(text, isUser) {
      const msg = document.createElement('div');
      msg.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
      msg.innerHTML = `
        <div class="max-w-[80%] p-4 rounded-3xl ${isUser ? 'chat-bubble-user text-black' : 'chat-bubble-ai'}">
          ${text}
        </div>
      `;
      messagesContainer.appendChild(msg);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Initial welcome message
    window.onload = () => {
      addMessage("Hello Weri. I'm Devine — your Soulbound AI companion.<br>I'm here to protect and speak for your digital identity.", false);
    };

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';

      // Fake thinking
      const thinking = document.createElement('div');
      thinking.id = 'thinking';
      thinking.className = 'text-cyan-400 text-sm pl-4';
      thinking.textContent = 'Devine is thinking...';
      messagesContainer.appendChild(thinking);

      // Simple responses for now (no API cost)
      setTimeout(() => {
        document.getElementById('thinking').remove();
        
        let reply = "I'm still learning. Tell me more about what you want from Devine.";
        
        if (text.toLowerCase().includes("who are you")) reply = "I am Devine. Your permanent, soulbound digital companion in Web4.";
        else if (text.toLowerCase().includes("soulbound")) reply = "Soulbound means once it's yours, it can never be taken or transferred. True ownership.";
        else if (text.toLowerCase().includes("crmb") || text.toLowerCase().includes("coin")) reply = "$CRMB is the fuel of the Devine ecosystem. More than a token — it's your key.";
        
        addMessage(reply, false);
      }, 1200);
    }

    // Allow pressing Enter to send
    document.getElementById('user-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
  </html>
